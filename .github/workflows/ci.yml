name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest
        run: pytest tests/ -q

      - name: Node tests — generators
        run: node tests/js_generators.test.js

      - name: Node tests — share
        run: node tests/features_share.test.js

      - name: Node tests — scenario normalize
        run: node tests/scenario_normalize.test.js

      - name: Node tests — scenario engine
        run: node tests/scenario_engine.test.js

      - name: Node tests — scenario validate
        run: node tests/scenario_validate.test.js
